<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>enlaces-amandarina</title>
    <style>
      /* Page background and base reset */
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: url("src/assets/fondo-amandarina.jpg");
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
      }

      /* Inlined App CSS (responsive and accessible) */
      .app {
        width: 100%;
        min-height: 100vh;
      }

      .overlay {
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.65) 0%,
          rgba(0, 0, 0, 0.45) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 920px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 28px;
        align-items: center;
        text-align: center;
      }

      .header {
        margin-bottom: 40px;
      }

      .brand-title {
        color: white;
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        letter-spacing: 2px;
        margin-bottom: 10px;
      }

      .buttons-container {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 8px;
        width: 100%;
        align-items: center;
      }

      .btn {
        padding: 15px 25px;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
        width: 100%;
        max-width: 420px;
        box-sizing: border-box;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }
      .btn:hover::before {
        left: 100%;
      }
      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }
      .btn:active {
        transform: translateY(-1px);
      }
      .btn:focus {
        outline: 3px solid rgba(255, 255, 255, 0.15);
        outline-offset: 2px;
      }

      .btn-ingresar {
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        color: white;
        font-size: 1.3rem;
        padding: 18px 25px;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }
      .btn-github {
        background: linear-gradient(45deg, #333, #24292e);
        color: white;
      }
      .btn-whatsapp {
        background: linear-gradient(45deg, #25d366, #128c7e);
        color: white;
      }
      .btn-facebook {
        background: linear-gradient(45deg, #1877f2, #0d5ab9);
        color: white;
      }
      .btn-instagram {
        background: linear-gradient(45deg, #f09433, #d62976, #962fbf, #4f5bd5);
        color: white;
      }

      .design-elements {
        margin-top: 30px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(6px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        width: 100%;
        max-width: 700px;
      }
      .innovation-line {
        color: white;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 3px;
      }
      .tech-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-bottom: 15px;
      }
      .tag {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        padding: 8px 15px;
        border-radius: 25px;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .impact-text {
        color: #ffd700;
        font-size: 1.3rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 10px;
      }

      @media (max-width: 768px) {
        .brand-title {
          font-size: 2rem;
        }
        .btn {
          padding: 12px 20px;
          font-size: 1rem;
          max-width: 520px;
        }
      }
      @media (max-width: 480px) {
        .overlay {
          padding: 12px;
        }
        .brand-title {
          font-size: 1.8rem;
        }
        .btn {
          padding: 10px 15px;
          font-size: 0.9rem;
        }
      }
      @media (min-width: 900px) {
        .buttons-container {
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: center;
          gap: 16px;
        }
        .btn {
          width: auto;
          min-width: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="overlay">
        <div class="container">
          <header class="header">
            <h1 class="brand-title">amandarina.cl</h1>
          </header>

          <div class="buttons-container">
            <button class="btn btn-ingresar" data-url="#">INGRESAR</button>
            <button class="btn btn-github" data-url="https://github.com">
              <span class="btn-icon">🐙</span> GitHub
            </button>
            <button
              class="btn btn-whatsapp"
              data-url="https://wa.me/1234567890"
            >
              <span class="btn-icon">📱</span> WhatsApp
            </button>
            <button class="btn btn-facebook" data-url="https://facebook.com">
              <span class="btn-icon">📘</span> Facebook
            </button>
            <button class="btn btn-instagram" data-url="https://instagram.com">
              <span class="btn-icon">📷</span> Instagram
            </button>
          </div>

          <div class="design-elements">
            <div class="innovation-text">
              <p class="innovation-line">INNOVACIÓN QUE TRANSFORMA</p>
              <div class="tech-tags">
                <span class="tag">LEGAL-TECH</span>
                <span class="tag">AUTOMATIZACIÓN</span>
                <span class="tag">DISEÑO IMPACTANTE</span>
              </div>
              <p class="impact-text">CLARIDAD + INNOVACIÓN = IMPACTO</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Add click handlers for buttons
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var url = btn.getAttribute("data-url") || "#";
            if (url === "#") {
              // internal placeholder — scroll to design elements
              document
                .querySelector(".design-elements")
                ?.scrollIntoView({ behavior: "smooth" });
            } else {
              window.open(url, "_blank");
            }
          });
        });
      });
    </script>
  </body>
</html>
